effective: |
  context:
  - src/
  builders:
    minify:
      fromImage:
        path: node
        digest: sha256:5209bcaca9836eb3448b650396213dbe9d9a34d31840c2ae1f206cb2986a8543
      label:
        org.opencontainers.image.base.digest: sha256:5209bcaca9836eb3448b650396213dbe9d9a34d31840c2ae1f206cb2986a8543
        org.opencontainers.image.base.name: docker.io/node:alpine
      workdir: /app
      copy:
      - paths:
        - src/
        target: /app/src/
      run:
      - npm install -g esbuild html-minifier-terser
      - mkdir -p dist/js dist/css
      - esbuild src/js/app.js --bundle --minify --outfile=dist/js/app.js
      - esbuild src/css/styles.css --minify --outfile=dist/css/styles.css
      - html-minifier-terser --collapse-whitespace --remove-comments --remove-redundant-attributes --minify-css true --minify-js true -o dist/index.html src/index.html
  fromImage:
    path: nginxinc/nginx-unprivileged
    digest: sha256:ccbac1a4c20a8b41c5dd1691bd91d63eda3b7989d643a33fd47841838519bfb9
  label:
    io.dofigen.version: 2.7.0
    org.opencontainers.image.base.name: docker.io/nginxinc/nginx-unprivileged:alpine
    org.opencontainers.image.base.digest: sha256:ccbac1a4c20a8b41c5dd1691bd91d63eda3b7989d643a33fd47841838519bfb9
  copy:
  - fromBuilder: minify
    paths:
    - /app/dist/
    target: /usr/share/nginx/html/
  expose:
  - port: 8080
images:
  docker.io:
    library:
      node:
        alpine:
          digest: sha256:5209bcaca9836eb3448b650396213dbe9d9a34d31840c2ae1f206cb2986a8543
    nginxinc:
      nginx-unprivileged:
        alpine:
          digest: sha256:ccbac1a4c20a8b41c5dd1691bd91d63eda3b7989d643a33fd47841838519bfb9
resources:
  dofigen.yml:
    hash: 7eeba6007fa3fc4ee389927e9ffc84a1dc9778bec7247c3bb33a511b4274721a
    content: |
      builders:
        minify:
          fromImage: node:alpine
          workdir: /app
          copy:
            - paths:
                - src/
              target: /app/src/
          run:
            - npm install -g esbuild html-minifier-terser
            - mkdir -p dist/js dist/css
            - esbuild src/js/app.js --bundle --minify --outfile=dist/js/app.js
            - esbuild src/css/styles.css --minify --outfile=dist/css/styles.css
            - html-minifier-terser --collapse-whitespace --remove-comments --remove-redundant-attributes --minify-css true --minify-js true -o dist/index.html src/index.html
      fromImage: nginxinc/nginx-unprivileged:alpine
      copy:
        - fromBuilder: minify
          paths: /app/dist/
          target: /usr/share/nginx/html/
      expose:
        - 8080
      context:
        - src/
